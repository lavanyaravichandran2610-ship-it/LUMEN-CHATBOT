<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumen AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌗 THEME */
:root {
    --bg: #1e1f25;
    --text: #ffffff;
    --sidebar: #202123;
    --bot: #2a2b32;
    --user: #444654;
    --input: #40414f;
}

body.light {
    --bg: #f5f5f5;
    --text: #111;
    --sidebar: #e0e0e0;
    --bot: #ffffff;
    --user: #dcdcdc;
    --input: #eeeeee;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
html, body {
    height: 100%;
    background: var(--bg);
}

body {
    font-family: system-ui;
    color: var(--text);
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: var(--sidebar);
    padding: 15px;
}

.sidebar button {
    margin-top: 10px;
    padding: 10px;
    background: #10a37f;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* CHAT */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 120px;
}

/* MESSAGE */
.msg {
    max-width: 700px;
    margin: 10px auto;
    padding: 12px;
    border-radius: 10px;
    color: var(--text);
}

.user { background: var(--user); }
.bot { background: var(--bot); }

.typing {
    opacity: 0.6;
    font-style: italic;
}

/* INPUT */
.input-area {
    position: fixed;
    bottom: 0;
    left: 240px;
    right: 0;
    background: var(--input);
    padding: 15px;
}

.input-box {
    max-width: 800px;
    margin: auto;
    display: flex;
    background: var(--bot);
    padding: 10px;
    border-radius: 10px;
}

input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    outline: none;
}

button.send {
    background: #10a37f;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {
    .sidebar { display: none; }
    .input-area { left: 0; }
}

</style>
</head>

<body>

<div class="sidebar">
    <h2>✨ Lumen</h2>
    <button onclick="clearChat()">+ New Chat</button>
    <button onclick="toggleTheme()" id="theme-btn">🌙</button>
</div>

<div class="main">

    <div id="chat-box"></div>

    <form class="input-area" id="chat-form">
        <div class="input-box">
            <input id="input" placeholder="Message Lumen..." required />
            <button class="send" type="submit">➤</button>
        </div>
    </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("chat-form");
    const input = document.getElementById("input");
    const chatBox = document.getElementById("chat-box");
    const themeBtn = document.getElementById("theme-btn");

    /* 💬 SEND MESSAGE */
    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        let message = input.value.trim();
        if (!message) return;

        // user msg
        let userMsg = document.createElement("div");
        userMsg.className = "msg user";
        userMsg.innerText = message;
        chatBox.appendChild(userMsg);

        input.value = "";

        // typing
        let typing = document.createElement("div");
        typing.className = "msg bot typing";
        typing.innerText = "Lumen is thinking...";
        chatBox.appendChild(typing);

        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            let res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message})
            });

            let data = await res.json();
            typing.remove();

            let botMsg = document.createElement("div");
            botMsg.className = "msg bot";
            botMsg.innerText = data.reply;
            chatBox.appendChild(botMsg);

            chatBox.scrollTop = chatBox.scrollHeight;

            // 💛 follow up
            if (data.follow_up) {
                setTimeout(() => {
                    let follow = document.createElement("div");
                    follow.className = "msg bot";
                    follow.innerText = data.follow_up;
                    chatBox.appendChild(follow);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 3500);
            }

        } catch {
            typing.innerText = "Server error 😅";
        }
    });

    /* 🌗 THEME */
    themeBtn.onclick = function () {
        document.body.classList.toggle("light");
        localStorage.setItem("theme",
            document.body.classList.contains("light") ? "light" : "dark"
        );
    };

    /* LOAD THEME */
    if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light");
        themeBtn.textContent = "☀️";
    }

});

/* 🧹 CLEAR */
async function clearChat() {
    await fetch("/clear", {method: "POST"});
    document.getElementById("chat-box").innerHTML = "";
}
</script>

</body>
</html>
