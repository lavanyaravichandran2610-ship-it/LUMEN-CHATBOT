<script>

/* 💬 SEND MESSAGE */
async function sendMessage(e) {
    e.preventDefault();

    let input = document.getElementById("input");
    let message = input.value.trim();
    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    // ✅ USER MESSAGE
    let userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerText = message;
    chatBox.appendChild(userMsg);

    input.value = "";

    // 🤖 TYPING
    let typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.innerText = "Lumen is thinking...";
    chatBox.appendChild(typing);

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        let data = await res.json();

        typing.remove();

        // 🤖 MAIN REPLY
        let botMsg = document.createElement("div");
        botMsg.className = "msg bot";
        botMsg.innerText = data.reply;
        chatBox.appendChild(botMsg);

        chatBox.scrollTop = chatBox.scrollHeight;

        // 💛 FOLLOW-UP (EMOTIONAL DELAY)
        if (data.follow_up) {
            setTimeout(() => {

                let typing2 = document.createElement("div");
                typing2.className = "msg bot typing";
                typing2.innerText = "Lumen is thinking...";
                chatBox.appendChild(typing2);

                chatBox.scrollTop = chatBox.scrollHeight;

                setTimeout(() => {
                    typing2.remove();

                    let followMsg = document.createElement("div");
                    followMsg.className = "msg bot";
                    followMsg.innerText = data.follow_up;
                    chatBox.appendChild(followMsg);

                    chatBox.scrollTop = chatBox.scrollHeight;

                }, 1500);

            }, 3500); // delay before second message
        }

    } catch {
        typing.innerText = "Server error 😅";
    }
}

/* ⌨️ ENTER KEY SUPPORT */
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage(e);
    }
});

/* 🌗 TOGGLE THEME */
function toggleTheme() {
    let body = document.body;
    let btn = document.getElementById("theme-btn");

    body.classList.toggle("light");

    if (body.classList.contains("light")) {
        btn.textContent = "☀️";
        localStorage.setItem("theme", "light");
    } else {
        btn.textContent = "🌙";
        localStorage.setItem("theme", "dark");
    }
}

/* 🔄 LOAD SAVED THEME */
window.onload = () => {
    let savedTheme = localStorage.getItem("theme");
    let btn = document.getElementById("theme-btn");

    if (savedTheme === "light") {
        document.body.classList.add("light");
        btn.textContent = "☀️";
    } else {
        btn.textContent = "🌙";
    }
};

/* 🧹 CLEAR CHAT */
async function clearChat() {
    await fetch("/clear", {method: "POST"});
    document.getElementById("chat-box").innerHTML = "";
}

</script>
