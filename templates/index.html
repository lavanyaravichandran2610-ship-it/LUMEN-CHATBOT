<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumen AI (Accessible)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #1e1f25;
    color: #ffffff;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: #202123;
    height: 100vh;
    padding: 15px;
}

.sidebar h1 {
    font-size: 20px;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    background: #10a37f;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.sidebar button:focus {
    outline: 3px solid #ffffff;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Chat */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* Messages */
.msg {
    max-width: 700px;
    margin: 10px auto;
    padding: 12px;
    border-radius: 10px;
    line-height: 1.5;
}

.user {
    background: #444654;
}

.bot {
    background: #2a2b32;
}

/* Input */
.input-area {
    padding: 15px;
    background: #40414f;
}

.input-box {
    display: flex;
    background: #343541;
    border-radius: 10px;
    padding: 10px;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    outline: none;
    font-size: 16px;
}

button.send {
    background: #10a37f;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
}

button.send:focus {
    outline: 3px solid #ffffff;
}

.typing {
    font-style: italic;
    opacity: 0.7;
}
</style>
</head>

<body>

<!-- Sidebar -->
<nav class="sidebar" aria-label="Sidebar">
    <h1>✨ Lumen</h1>
    <button onclick="clearChat()" aria-label="Start a new chat">+ New Chat</button>
</nav>

<!-- Main Chat -->
<main class="main">
    
    <!-- Chat messages -->
    <section id="chat-box"
        role="log"
        aria-live="polite"
        aria-relevant="additions"
        aria-label="Chat messages">
    </section>

    <!-- Input -->
    <form class="input-area" onsubmit="sendMessage(event)" aria-label="Send message form">
        <div class="input-box">
            <label for="input" class="visually-hidden">Type your message</label>
            <input 
                id="input"
                type="text"
                placeholder="Type your message..."
                aria-label="Message input"
                required
            />
            <button class="send" type="submit" aria-label="Send message">Send</button>
        </div>
    </form>

</main>

<script>
async function sendMessage(event) {
    event.preventDefault();

    let input = document.getElementById("input");
    let message = input.value.trim();
    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    // User message
    let userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.setAttribute("role", "article");
    userMsg.innerText = message;
    chatBox.appendChild(userMsg);

    input.value = "";

    // Typing indicator
    let typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.setAttribute("role", "status");
    typing.innerText = "Lumen is thinking...";
    chatBox.appendChild(typing);

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        let data = await res.json();

        typing.remove();

        let botMsg = document.createElement("div");
        botMsg.className = "msg bot";
        botMsg.setAttribute("role", "article");
        botMsg.innerText = data.reply;
        chatBox.appendChild(botMsg);

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch {
        typing.innerText = "Server error 😅";
    }
}

// Keyboard shortcut (Enter)
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage(e);
    }
});

async function clearChat() {
    await fetch("/clear", {method: "POST"});
    document.getElementById("chat-box").innerHTML = "";
}
</script>

</body>
</html>
