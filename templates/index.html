<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumen AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #343541;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: #202123;
    height: 100vh;
    padding: 10px;
}

.sidebar h2 {
    font-size: 18px;
    margin-bottom: 20px;
}

.new-chat {
    background: #343541;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

/* MAIN CHAT */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* CHAT AREA */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* MESSAGE */
.msg {
    max-width: 700px;
    margin: 10px auto;
    padding: 12px;
    border-radius: 10px;
    line-height: 1.5;
}

.user {
    background: #444654;
}

.bot {
    background: #343541;
}

/* INPUT AREA */
.input-area {
    padding: 15px;
    background: #40414f;
    display: flex;
    justify-content: center;
}

.input-box {
    width: 80%;
    display: flex;
    background: #343541;
    border-radius: 10px;
    padding: 10px;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    outline: none;
    font-size: 16px;
}

button {
    background: #10a37f;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

/* TYPING */
.typing {
    opacity: 0.7;
    font-style: italic;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>✨ Lumen</h2>
    <div class="new-chat" onclick="clearChat()">+ New Chat</div>
</div>

<div class="main">

    <div id="chat-box"></div>

    <div class="input-area">
        <div class="input-box">
            <input id="input" placeholder="Message Lumen..." />
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

</div>

<script>
async function sendMessage() {
    let input = document.getElementById("input");
    let message = input.value.trim();
    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `<div class="msg user">${message}</div>`;
    input.value = "";

    // typing indicator
    let typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.innerText = "Lumen is typing...";
    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        let data = await res.json();

        typing.remove();

        chatBox.innerHTML += `<div class="msg bot">${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (err) {
        typing.innerText = "Server error 😅";
    }
}

// ENTER KEY
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendMessage();
});

function clearChat() {
    document.getElementById("chat-box").innerHTML = "";
}
</script>

</body>
</html>
