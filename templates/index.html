<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumen AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #1e1f25;
    color: white;
    display: flex;
}

.sidebar {
    width: 220px;
    background: #202123;
    padding: 15px;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    max-width: 700px;
    margin: 10px auto;
    padding: 12px;
    border-radius: 10px;
}

.user { background: #444654; }
.bot { background: #2a2b32; }

.input-area {
    position: fixed;
    bottom: 0;
    left: 220px;
    right: 0;
    padding: 10px;
    background: #40414f;
}

.input-box {
    display: flex;
    max-width: 800px;
    margin: auto;
    background: #2a2b32;
    padding: 10px;
    border-radius: 10px;
}

input {
    flex: 1;
    border: none;
    background: transparent;
    color: white;
}

button {
    background: #10a37f;
    border: none;
    padding: 8px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>✨ Lumen</h2>
</div>

<div class="main">

    <div id="chat-box"></div>

    <form class="input-area" id="form">
        <div class="input-box">
            <input id="input" placeholder="Type message..." required>
            <input type="file" id="imageInput" accept="image/*">
            <button>➤</button>
        </div>
    </form>

</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    let input = document.getElementById("input");
    let fileInput = document.getElementById("imageInput");
    let chatBox = document.getElementById("chat-box");

    let message = input.value.trim();

    let formData = new FormData();
    formData.append("message", message);

    if (fileInput.files[0]) {
        formData.append("image", fileInput.files[0]);

        let img = document.createElement("img");
        img.src = URL.createObjectURL(fileInput.files[0]);
        img.style.maxWidth = "200px";
        chatBox.appendChild(img);
    }

    if (message) {
        chatBox.innerHTML += `<div class="msg user">${message}</div>`;
    }

    input.value = "";

    let typing = document.createElement("div");
    typing.className = "msg bot";
    typing.innerText = "Lumen is thinking...";
    chatBox.appendChild(typing);

    let res = await fetch("/chat", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    typing.remove();

    chatBox.innerHTML += `<div class="msg bot">${data.reply}</div>`;

    if (data.follow_up) {
        setTimeout(() => {
            chatBox.innerHTML += `<div class="msg bot">${data.follow_up}</div>`;
        }, 3000);
    }

    chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
