<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumen AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌗 THEME VARIABLES */
:root {
    --bg: #1e1f25;
    --text: #ffffff;
    --sidebar: #202123;
    --bot: #2a2b32;
    --user: #444654;
    --input: #40414f;
}

body.light {
    --bg: #f5f5f5;
    --text: #111;
    --sidebar: #e0e0e0;
    --bot: #ffffff;
    --user: #dcdcdc;
    --input: #eeeeee;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: system-ui;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: var(--sidebar);
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar button {
    padding: 10px;
    margin-bottom: 10px;
    border: none;
    background: #10a37f;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* CHAT */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 100px;
}

/* MESSAGES */
.msg {
    max-width: 700px;
    margin: 10px auto;
    padding: 12px;
    border-radius: 10px;
}

.user {
    background: var(--user);
}

.bot {
    background: var(--bot);
}

/* INPUT AREA */
.input-area {
    position: fixed;
    bottom: 0;
    left: 240px;
    right: 0;
    padding: 15px;
    background: var(--input);
}

/* INPUT BOX */
.input-box {
    max-width: 800px;
    margin: auto;
    display: flex;
    background: var(--bot);
    border-radius: 10px;
    padding: 10px;
}

/* INPUT FIELD */
input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    outline: none;
    font-size: 16px;
}

/* SEND BUTTON */
button.send {
    background: #10a37f;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

/* THEME BUTTON */
#theme-btn {
    font-size: 18px;
}

/* TYPING TEXT */
.typing {
    opacity: 0.7;
    font-style: italic;
}

/* MOBILE */
@media (max-width: 768px) {
    .sidebar {
        display: none;
    }

    .input-area {
        left: 0;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>✨ Lumen</h2>
    <button onclick="clearChat()">+ New Chat</button>

    <!-- 🌗 THEME TOGGLE BUTTON -->
    <button onclick="toggleTheme()" id="theme-btn">🌙</button>
</div>

<!-- MAIN -->
<div class="main">

    <div id="chat-box"></div>

    <form class="input-area" onsubmit="sendMessage(event)">
        <div class="input-box">
            <input id="input" placeholder="Message Lumen..." />
            <button class="send">➤</button>
        </div>
    </form>

</div>

<script>

/* 💬 SEND MESSAGE */
async function sendMessage(e) {
    e.preventDefault();

    let input = document.getElementById("input");
    let message = input.value.trim();
    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `<div class="msg user">${message}</div>`;
    input.value = "";

    let typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.innerText = "Lumen is thinking...";
    chatBox.appendChild(typing);

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        let data = await res.json();

        typing.remove();
        chatBox.innerHTML += `<div class="msg bot">${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch {
        typing.innerText = "Server error 😅";
    }
}

/* 🌗 TOGGLE THEME */
function toggleTheme() {
    let body = document.body;
    let btn = document.getElementById("theme-btn");

    body.classList.toggle("light");

    if (body.classList.contains("light")) {
        btn.textContent = "☀️";
        localStorage.setItem("theme", "light");
    } else {
        btn.textContent = "🌙";
        localStorage.setItem("theme", "dark");
    }
}

/* 🔄 LOAD SAVED THEME */
window.onload = () => {
    let savedTheme = localStorage.getItem("theme");
    let btn = document.getElementById("theme-btn");

    if (savedTheme === "light") {
        document.body.classList.add("light");
        btn.textContent = "☀️";
    } else {
        btn.textContent = "🌙";
    }
};

/* 🧹 CLEAR CHAT */
async function clearChat() {
    await fetch("/clear", {method: "POST"});
    document.getElementById("chat-box").innerHTML = "";
}

</script>

</body>
</html>
