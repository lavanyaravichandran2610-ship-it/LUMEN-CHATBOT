<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumen AI (Accessible)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #1e1f25;
    color: white;
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #202123;
    height: 100vh;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar button {
    padding: 12px;
    border: none;
    background: #10a37f;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.sidebar button:hover {
    background: #0e8f6f;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* CHAT AREA */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 120px; /* space for input */
}

/* MESSAGE */
.msg {
    max-width: 750px;
    margin: 10px auto;
    padding: 14px;
    border-radius: 12px;
    line-height: 1.5;
    animation: fadeIn 0.2s ease-in;
}

/* USER MESSAGE */
.user {
    background: #444654;
}

/* BOT MESSAGE */
.bot {
    background: #2a2b32;
}

/* INPUT AREA (FIXED BOTTOM) */
.input-area {
    position: fixed;
    bottom: 0;
    left: 240px; /* match sidebar */
    right: 0;
    padding: 15px;
    background: #40414f;
    border-top: 1px solid #555;
}

/* INPUT BOX */
.input-box {
    max-width: 800px;
    margin: auto;
    display: flex;
    background: #343541;
    border-radius: 12px;
    padding: 10px;
}

/* INPUT FIELD */
input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    font-size: 16px;
    outline: none;
}

/* BUTTON */
button.send {
    background: #10a37f;
    border: none;
    color: white;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
}

button.send:hover {
    background: #0e8f6f;
}

/* TYPING TEXT */
.typing {
    opacity: 0.7;
    font-style: italic;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(5px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* SCROLLBAR (OPTIONAL NICE LOOK) */
#chat-box::-webkit-scrollbar {
    width: 6px;
}

#chat-box::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 10px;
}

/* 📱 MOBILE RESPONSIVE */
@media (max-width: 768px) {
    .sidebar {
        display: none;
    }

    .input-area {
        left: 0;
    }

    .msg {
        max-width: 95%;
    }
}
</style>
</head>

<body>

<!-- Sidebar -->
<nav class="sidebar" aria-label="Sidebar">
    <h1>✨ Lumen</h1>
    <button onclick="clearChat()" aria-label="Start a new chat">+ New Chat</button>
</nav>

<!-- Main Chat -->
<main class="main">
    
    <!-- Chat messages -->
    <section id="chat-box"
        role="log"
        aria-live="polite"
        aria-relevant="additions"
        aria-label="Chat messages">
    </section>

    <!-- Input -->
    <form class="input-area" onsubmit="sendMessage(event)" aria-label="Send message form">
        <div class="input-box">
            <label for="input" class="visually-hidden">Type your message</label>
            <input 
                id="input"
                type="text"
                placeholder="Type your message..."
                aria-label="Message input"
                required
            />
            <button class="send" type="submit" aria-label="Send message">Send</button>
        </div>
    </form>

</main>

<script>
async function sendMessage(event) {
    event.preventDefault();

    let input = document.getElementById("input");
    let message = input.value.trim();
    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    // User message
    let userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.setAttribute("role", "article");
    userMsg.innerText = message;
    chatBox.appendChild(userMsg);

    input.value = "";

    // Typing indicator
    let typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.setAttribute("role", "status");
    typing.innerText = "Lumen is thinking...";
    chatBox.appendChild(typing);

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        let data = await res.json();

        typing.remove();

        let botMsg = document.createElement("div");
        botMsg.className = "msg bot";
        botMsg.setAttribute("role", "article");
        botMsg.innerText = data.reply;
        chatBox.appendChild(botMsg);

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch {
        typing.innerText = "Server error 😅";
    }
}

// Keyboard shortcut (Enter)
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage(e);
    }
});

async function clearChat() {
    await fetch("/clear", {method: "POST"});
    document.getElementById("chat-box").innerHTML = "";
}
</script>

</body>
</html>
