<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumen AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌗 THEME */
:root {
    --bg: #1e1f25;
    --text: #ffffff;
    --sidebar: #202123;
    --bot: #2a2b32;
    --user: #444654;
    --input: #40414f;
}

body.light {
    --bg: #f5f5f5;
    --text: #111;
    --sidebar: #e0e0e0;
    --bot: #ffffff;
    --user: #dcdcdc;
    --input: #eeeeee;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
html, body {
    height: 100%;
    background: var(--bg);
}

body {
    font-family: system-ui;
    color: var(--text);
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: var(--sidebar);
    padding: 15px;
}

.sidebar button {
    margin-top: 10px;
    padding: 10px;
    background: #10a37f;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* CHAT */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 140px;
}

/* MESSAGE */
.msg {
    max-width: 700px;
    margin: 10px auto;
    padding: 12px;
    border-radius: 10px;
}

.user { background: var(--user); }
.bot { background: var(--bot); }

.typing {
    opacity: 0.6;
    font-style: italic;
}

/* 📷 IMAGE PREVIEW */
.preview-img {
    max-width: 220px;
    display: block;
    margin: 10px auto;
    border-radius: 10px;
}

/* INPUT */
.input-area {
    position: fixed;
    bottom: 0;
    left: 240px;
    right: 0;
    background: var(--input);
    padding: 12px;
}

/* INPUT BOX */
.input-box {
    max-width: 850px;
    margin: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bot);
    padding: 10px;
    border-radius: 12px;
}

/* TEXT INPUT */
#input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    outline: none;
    font-size: 15px;
}

/* 📎 BUTTON */
.upload-btn {
    font-size: 20px;
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 6px;
}

.upload-btn:hover {
    background: rgba(255,255,255,0.1);
}

/* FILE NAME */
#file-name {
    font-size: 11px;
    opacity: 0.7;
}

/* SEND BUTTON */
button.send {
    background: #10a37f;
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {
    .sidebar { display: none; }
    .input-area { left: 0; }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>✨ Lumen</h2>
    <button onclick="clearChat()">+ New Chat</button>
    <button onclick="toggleTheme()" id="theme-btn">🌙</button>
</div>

<!-- MAIN -->
<div class="main">

    <div id="chat-box"></div>

    <form class="input-area" id="chat-form">
        <div class="input-box">

            <!-- 📎 Upload -->
            <label for="imageInput" class="upload-btn">📎</label>
            <input type="file" id="imageInput" accept="image/*" hidden>

            <!-- TEXT -->
            <input id="input" type="text" placeholder="Message Lumen..." />

            <!-- SEND -->
            <button class="send" type="submit">➤</button>

        </div>

        <!-- file name -->
        <div style="max-width:850px;margin:auto;">
            <span id="file-name"></span>
        </div>

    </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("chat-form");
    const input = document.getElementById("input");
    const chatBox = document.getElementById("chat-box");
    const themeBtn = document.getElementById("theme-btn");
    const fileInput = document.getElementById("imageInput");
    const fileName = document.getElementById("file-name");

    /* 📎 SHOW FILE NAME */
    fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) {
            fileName.textContent = fileInput.files[0].name;
        }
    });

    /* 💬 SEND */
    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        let message = input.value.trim();

        if (!message && !fileInput.files[0]) return;

        let formData = new FormData();
        formData.append("message", message);

        // 👤 TEXT
        if (message) {
            let userMsg = document.createElement("div");
            userMsg.className = "msg user";
            userMsg.innerText = message;
            chatBox.appendChild(userMsg);
        }

        // 📷 IMAGE PREVIEW
        if (fileInput.files[0]) {
            let img = document.createElement("img");
            img.src = URL.createObjectURL(fileInput.files[0]);
            img.className = "preview-img";
            chatBox.appendChild(img);

            formData.append("image", fileInput.files[0]);
        }

        input.value = "";
        fileInput.value = "";
        fileName.textContent = "";

        // typing
        let typing = document.createElement("div");
        typing.className = "msg bot typing";
        typing.innerText = "Lumen is thinking...";
        chatBox.appendChild(typing);

        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            let res = await fetch("/chat", {
                method: "POST",
                body: formData
            });

            let data = await res.json();
            typing.remove();

            let botMsg = document.createElement("div");
            botMsg.className = "msg bot";
            botMsg.innerText = data.reply;
            chatBox.appendChild(botMsg);

            chatBox.scrollTop = chatBox.scrollHeight;

            // 💛 follow-up
            if (data.follow_up) {
                setTimeout(() => {
                    let follow = document.createElement("div");
                    follow.className = "msg bot";
                    follow.innerText = data.follow_up;
                    chatBox.appendChild(follow);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 3000);
            }

        } catch {
            typing.innerText = "Server error 😅";
        }
    });

    /* 🌗 THEME */
    window.toggleTheme = function () {
        document.body.classList.toggle("light");
        localStorage.setItem("theme",
            document.body.classList.contains("light") ? "light" : "dark"
        );
    };

    if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light");
        themeBtn.textContent = "☀️";
    }

});

/* 🧹 CLEAR */
async function clearChat() {
    await fetch("/clear", {method: "POST"});
    document.getElementById("chat-box").innerHTML = "";
}
</script>

</body>
</html>
